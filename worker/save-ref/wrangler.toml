name = "save-ref-worker"
main = "src/index.js"
compatibility_date = "2025-05-01"

# KV holds the refs (and uploaded blobs unless you add R2 below).
# Create it once, then paste the printed id:
#   npx wrangler kv namespace create save-ref-kv
[[kv_namespaces]]
binding = "REFS_KV"
id = "REPLACE_WITH_KV_ID"

# OPTIONAL — offload uploaded image/file bytes to R2 instead of KV (recommended
# if you drop lots of large files; KV values are capped at 25 MB). Create with:
#   npx wrangler r2 bucket create save-ref-blobs
# then uncomment:
# [[r2_buckets]]
# binding = "REFS_R2"
# bucket_name = "save-ref-blobs"

# AUTH_TOKEN is a secret, never committed. Set it with:
#   openssl rand -hex 32           # copy the output -> this is your Big Brain token
#   npx wrangler secret put AUTH_TOKEN
# Paste the SAME value into the /drop page's first-time setup field.
