name: Deploy Future Outfit to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "future-outfit/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish the self-contained app folder as the site root,
      # so the live URL is https://<owner>.github.io/<repo>/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: future-outfit

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
