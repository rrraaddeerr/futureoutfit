name: Deploy Future Outfit to GitHub Pages
# Pages enabled with Source = GitHub Actions; deploys future-outfit/ as site root.
# Default branch is main; github-pages environment branch policy allows main.
#
# push to main  -> validate + deploy (live site updates)
# pull_request  -> validate only (catches breakage before it reaches main)

on:
  push:
    branches: [main]
    paths:
      - "future-outfit/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "future-outfit/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight runs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs on every event: proves the app is present and packageable as a
  # Pages artifact. On a PR this is the gate; on main it precedes deploy.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity-check the app
        run: |
          set -e
          test -f future-outfit/index.html
          bytes=$(wc -c < future-outfit/index.html)
          echo "future-outfit/index.html is ${bytes} bytes"
          test "$bytes" -gt 1000
          grep -qi "</html>" future-outfit/index.html
          echo "App looks deployable."

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: future-outfit

  # Only on a real push to main (never on PRs) — publishes the validated artifact.
  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
